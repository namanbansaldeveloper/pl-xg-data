<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PL xG Dashboard 2025/26</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0e0e12; font-family: 'Inter', 'Segoe UI', sans-serif; }
    button { font-family: inherit; cursor: pointer; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0e0e12; }
    ::-webkit-scrollbar-thumb { background: #ffffff20; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ── CONFIG ───────────────────────────────────────────────────────────────
    const GIST_URL = "https://gist.githubusercontent.com/namanbansaldeveloper/cd76999ba8ad394d07480f41d5b14840/raw/pl_xg_2025_26.json";
    // ─────────────────────────────────────────────────────────────────────────

    const TEAM_META = [
      { name: "Arsenal",        key: "Arsenal",                  color: "#EF0107", bg: "#1a0505" },
      { name: "Man City",       key: "Manchester City",           color: "#6CABDD", bg: "#051525" },
      { name: "Liverpool",      key: "Liverpool",                 color: "#C8102E", bg: "#1a0305" },
      { name: "Chelsea",        key: "Chelsea",                   color: "#034694", bg: "#020d1e" },
      { name: "Tottenham",      key: "Tottenham",                 color: "#AAAAAA", bg: "#0a0a0a" },
      { name: "Aston Villa",    key: "Aston Villa",               color: "#95BFE5", bg: "#04071a" },
      { name: "Newcastle",      key: "Newcastle United",          color: "#818B8D", bg: "#0a0c10" },
      { name: "Man United",     key: "Manchester United",         color: "#DA291C", bg: "#1a0403" },
      { name: "Brighton",       key: "Brighton",                  color: "#0057B8", bg: "#010f24" },
      { name: "West Ham",       key: "West Ham",                  color: "#7A263A", bg: "#160509" },
      { name: "Brentford",      key: "Brentford",                 color: "#E30613", bg: "#1a0102" },
      { name: "Crystal Palace", key: "Crystal Palace",            color: "#C4122E", bg: "#180204" },
      { name: "Bournemouth",    key: "Bournemouth",               color: "#CC0000", bg: "#1a0403" },
      { name: "Fulham",         key: "Fulham",                    color: "#CCCCCC", bg: "#0f0f0f" },
      { name: "Everton",        key: "Everton",                   color: "#003399", bg: "#010820" },
      { name: "Nottm Forest",   key: "Nottingham Forest",         color: "#DD0000", bg: "#180000" },
      { name: "Leeds",          key: "Leeds",                     color: "#FFCD00", bg: "#181300" },
      { name: "Sunderland",     key: "Sunderland",                color: "#EB172B", bg: "#180205" },
      { name: "Burnley",        key: "Burnley",                   color: "#A57C5B", bg: "#120009" },
      { name: "Wolves",         key: "Wolverhampton Wanderers",   color: "#FDB913", bg: "#181100" },
    ];

    const PLAYER_COLS = [
      { key: "xG",         label: "xG",        desc: "Expected Goals" },
      { key: "npxG",       label: "npxG",       desc: "Non-Penalty xG" },
      { key: "xA",         label: "xA",         desc: "Expected Assists" },
      { key: "shots",      label: "Shots",      desc: "Total Shots" },
      { key: "key_passes", label: "Key Passes", desc: "Key Passes" },
    ];

    const WINDOW = 6;
    const teamColor = (key) => TEAM_META.find(t => t.key === key)?.color || "#888";

    function rollingAvg(arr, w) {
      return arr.map((_, i) => {
        if (i < w - 1) return null;
        const s = arr.slice(i - w + 1, i + 1);
        return +(s.reduce((a, b) => a + b, 0) / w).toFixed(2);
      });
    }

    // ── Main Chart ────────────────────────────────────────────────────────────
    function MainChart({ team, matches }) {
      if (matches.length < WINDOW) return (
        <div style={{color:"#555",textAlign:"center",padding:60,fontSize:13}}>Not enough matches yet</div>
      );
      const rxg  = rollingAvg(matches.map(m => m.xg),  WINDOW);
      const rxgc = rollingAvg(matches.map(m => m.xgc), WINDOW);
      const gw = matches.length, W = 620, H = 300, p = {t:30,r:30,b:50,l:52};
      const cw = W-p.l-p.r, ch = H-p.t-p.b;
      const vals = [...rxg,...rxgc].filter(v => v !== null);
      const minV = Math.floor(Math.min(...vals)*4)/4 - 0.1;
      const maxV = Math.ceil( Math.max(...vals)*4)/4 + 0.2;
      const sy = v => ch - ((v-minV)/(maxV-minV))*ch;
      const sx = i => (i/(gw-1))*cw;
      const mkArea = data => {
        const pts = data.map((v,i) => v!==null?[sx(i),sy(v)]:null).filter(Boolean);
        const line = pts.map((p,i) => `${i===0?'M':'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
        return { line, area: line+` L${pts.at(-1)[0].toFixed(1)},${ch} L${pts[0][0].toFixed(1)},${ch} Z` };
      };
      const xgP = mkArea(rxg), xgcP = mkArea(rxgc);
      const yTicks = [];
      for (let v = Math.ceil(minV*4)/4; v <= maxV+0.01; v += 0.25) yTicks.push(+v.toFixed(2));
      const step = gw<=10?1:gw<=20?2:5;
      const labels = matches.map((_,i)=>i).filter(i => i===0||(i+1)%step===0);
      const uid = team.key.replace(/\s/g,'');
      return (
        <svg width="100%" viewBox={`0 0 ${W} ${H}`}>
          <defs>
            <linearGradient id={`gxg_${uid}`} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={team.color} stopOpacity=".25"/>
              <stop offset="100%" stopColor={team.color} stopOpacity=".02"/>
            </linearGradient>
            <linearGradient id="gxgc_g" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#f97316" stopOpacity=".2"/>
              <stop offset="100%" stopColor="#f97316" stopOpacity=".02"/>
            </linearGradient>
          </defs>
          <g transform={`translate(${p.l},${p.t})`}>
            {yTicks.map(v => (
              <g key={v}>
                <line x1={0} y1={sy(v)} x2={cw} y2={sy(v)} stroke="#ffffff12" strokeWidth={1} strokeDasharray={v%0.5===0?"none":"3,4"}/>
                {v%0.5===0 && <text x={-8} y={sy(v)+4} textAnchor="end" fontSize={10} fill="#888">{v.toFixed(1)}</text>}
              </g>
            ))}
            <line x1={0} y1={0} x2={0} y2={ch} stroke="#ffffff25" strokeWidth={1}/>
            <line x1={0} y1={ch} x2={cw} y2={ch} stroke="#ffffff25" strokeWidth={1}/>
            <path d={xgcP.area} fill="url(#gxgc_g)"/>
            <path d={xgP.area}  fill={`url(#gxg_${uid})`}/>
            <path d={xgcP.line} fill="none" stroke="#f97316"    strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round" strokeDasharray="7,4"/>
            <path d={xgP.line}  fill="none" stroke={team.color} strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round"/>
            {labels.map(i => (
              <text key={i} x={sx(i)} y={ch+16} textAnchor="middle" fontSize={9} fill="#666">{matches[i].date.slice(5)}</text>
            ))}
            <text x={cw/2} y={ch+34} textAnchor="middle" fontSize={11} fill="#555">Match Date</text>
            <text x={-34} y={ch/2} textAnchor="middle" fontSize={11} fill="#666" transform={`rotate(-90,-34,${ch/2})`}>xG</text>
            {[rxg,rxgc].map((data,idx) => {
              const li = data.map((v,i)=>v!==null?i:-1).filter(i=>i>=0).at(-1);
              if (li < 0) return null;
              return <circle key={idx} cx={sx(li)} cy={sy(data[li])} r={4} fill={idx===0?team.color:'#f97316'} stroke="#000" strokeWidth={1.5}/>;
            })}
          </g>
        </svg>
      );
    }

    // ── Mini Chart ────────────────────────────────────────────────────────────
    function MiniChart({ team, matches, w, h }) {
      if (!matches || matches.length < WINDOW) return (
        <svg width={w} height={h}><text x={w/2} y={h/2} textAnchor="middle" fontSize={8} fill="#444">{team.name}</text></svg>
      );
      const rxg  = rollingAvg(matches.map(m=>m.xg),  WINDOW);
      const rxgc = rollingAvg(matches.map(m=>m.xgc), WINDOW);
      const gw=matches.length, pp={t:16,r:10,b:16,l:6}, cw=w-pp.l-pp.r, ch=h-pp.t-pp.b;
      const vals=[...rxg,...rxgc].filter(v=>v!==null);
      const minV=Math.min(...vals)-0.1, maxV=Math.max(...vals)+0.1;
      const sy=v=>ch-((v-minV)/(maxV-minV))*ch, sx=i=>(i/(gw-1))*cw;
      const pd=data=>{
        const pts=data.map((v,i)=>v!==null?[sx(i),sy(v)]:null).filter(Boolean);
        return pts.map((p,i)=>`${i===0?'M':'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
      };
      return (
        <svg width={w} height={h} style={{display:'block'}}>
          <g transform={`translate(${pp.l},${pp.t})`}>
            <line x1={0} y1={ch} x2={cw} y2={ch} stroke="#ffffff15" strokeWidth={.5}/>
            <path d={pd(rxg)}  fill="none" stroke={team.color} strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round"/>
            <path d={pd(rxgc)} fill="none" stroke="#f97316"    strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round" strokeDasharray="4,2"/>
            <text x={cw/2} y={-4} textAnchor="middle" fontSize={8} fill="#bbb" fontWeight="600">{team.name}</text>
          </g>
        </svg>
      );
    }

    // ── Player Table ──────────────────────────────────────────────────────────
    function PlayerTable({ players, statKey, period }) {
      if (!players || players.length === 0) return (
        <div style={{color:"#555",textAlign:"center",padding:40,fontSize:13}}>No player data available</div>
      );
      const sorted = [...players]
        .filter(p => period==="season" || (p[period]?.games > 0))
        .sort((a,b) => (b[period]?.[statKey]||0) - (a[period]?.[statKey]||0))
        .slice(0, 10);
      const max = sorted[0]?.[period]?.[statKey] || 1;
      return (
        <div>
          {sorted.map((p, i) => {
            const val = p[period]?.[statKey] || 0;
            const tc  = teamColor(p.team);
            return (
              <div key={p.id} style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{color:"#ffffff30",fontSize:10,width:14,textAlign:"right"}}>{i+1}</span>
                    <span style={{color:"#fff",fontSize:13,fontWeight:600}}>{p.name}</span>
                    <span style={{color:tc,fontSize:10,background:tc+"18",padding:"1px 7px",borderRadius:4,border:`1px solid ${tc}30`}}>{p.team}</span>
                  </div>
                  <span style={{color:"#fff",fontSize:14,fontWeight:700}}>{typeof val==="number"&&val%1!==0?val.toFixed(2):val}</span>
                </div>
                <div style={{height:5,background:"#ffffff10",borderRadius:3,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${(val/max)*100}%`,background:`linear-gradient(90deg,${tc}80,${tc})`,borderRadius:3,transition:"width .4s"}}/>
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    // ── App ───────────────────────────────────────────────────────────────────
    function App() {
      const [page,    setPage]    = useState("teams");
      const [current, setCurrent] = useState(0);
      const [visible, setVisible] = useState(true);
      const [animDir, setAnimDir] = useState(0);
      const [teamData,setTeamData]= useState(null);
      const [players, setPlayers] = useState([]);
      const [status,  setStatus]  = useState("loading");
      const [updated, setUpdated] = useState("");
      const [pStat,   setPStat]   = useState("xG");
      const [pPeriod, setPPeriod] = useState("last6");

      const loadData = () => {
        setStatus("loading");
        fetch(GIST_URL + "?t=" + Date.now())
          .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
          .then(raw => {
            if (raw.teams) {
              setTeamData(raw.teams);
              setPlayers(raw.players || []);
              setUpdated(raw.meta?.updated_at ? new Date(raw.meta.updated_at).toLocaleString() : "");
            } else {
              setTeamData(raw);
              setPlayers([]);
            }
            setStatus("done");
          })
          .catch(e => setStatus("error:" + e.message));
      };

      useEffect(() => { loadData(); }, []);

      const go = dir => {
        setVisible(false); setAnimDir(dir);
        setTimeout(() => { setCurrent(i => (i+dir+TEAM_META.length)%TEAM_META.length); setVisible(true); }, 200);
      };
      const jump = i => {
        setAnimDir(i>current?1:-1); setVisible(false);
        setTimeout(() => { setCurrent(i); setVisible(true); }, 180);
      };

      if (status === "loading") return (
        <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:"#fff"}}>
          <svg width={48} height={48} viewBox="0 0 48 48" style={{marginBottom:16}}>
            <circle cx={24} cy={24} r={20} fill="none" stroke="#ffffff15" strokeWidth={4}/>
            <circle cx={24} cy={24} r={20} fill="none" stroke="#38bdf8" strokeWidth={4} strokeDasharray="30 100" strokeLinecap="round">
              <animateTransform attributeName="transform" type="rotate" from="0 24 24" to="360 24 24" dur="1s" repeatCount="indefinite"/>
            </circle>
          </svg>
          <div style={{fontSize:15,fontWeight:600,marginBottom:6}}>Loading xG data…</div>
          <div style={{color:"#ffffff50",fontSize:12}}>Fetching from GitHub Gist</div>
        </div>
      );

      if (status.startsWith("error")) return (
        <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:"#fff",padding:24}}>
          <div style={{fontSize:32,marginBottom:12}}>⚠️</div>
          <div style={{color:"#f87171",fontSize:14,marginBottom:8}}>Failed to load data</div>
          <div style={{color:"#ffffff50",fontSize:12,marginBottom:20,textAlign:"center",maxWidth:400}}>{status.replace("error:","")}</div>
          <button onClick={loadData} style={{background:"#38bdf8",color:"#000",border:"none",borderRadius:8,padding:"10px 24px",fontWeight:700}}>Retry</button>
        </div>
      );

      const team    = TEAM_META[current];
      const matches = (teamData && teamData[team.key]) || [];
      const rxg     = rollingAvg(matches.map(m=>m.xg),  WINDOW);
      const rxgc    = rollingAvg(matches.map(m=>m.xgc), WINDOW);
      const lastXg  = rxg.filter(v=>v!==null).at(-1);
      const lastXgc = rxgc.filter(v=>v!==null).at(-1);
      const sXg  = matches.length?(matches.reduce((a,m)=>a+m.xg, 0)/matches.length).toFixed(2):"—";
      const sXgc = matches.length?(matches.reduce((a,m)=>a+m.xgc,0)/matches.length).toFixed(2):"—";

      const navBtn = (label, target) => (
        <button onClick={() => setPage(target)} style={{
          background: page===target?"#38bdf8":"#ffffff10",
          color:      page===target?"#000":"#ffffff80",
          border:     page===target?"none":"1px solid #ffffff20",
          borderRadius:8, padding:"7px 16px", fontSize:12, fontWeight:600,
        }}>{label}</button>
      );

      return (
        <div style={{minHeight:"100vh",background:"#0e0e12",display:"flex",flexDirection:"column",alignItems:"center",padding:"16px 12px"}}>

          {/* Header */}
          <div style={{width:"100%",maxWidth:700,marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
              <div>
                <div style={{color:"#ffffff50",fontSize:10,letterSpacing:2,textTransform:"uppercase",marginBottom:2}}>Premier League 2025/26</div>
                <div style={{color:"#fff",fontSize:14,fontWeight:700}}>xG Dashboard</div>
                {updated && <div style={{color:"#ffffff30",fontSize:10,marginTop:2}}>Updated {updated}</div>}
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                {navBtn("📈 Team xG","teams")}
                {navBtn("👤 Players","players")}
                <button onClick={loadData} style={{background:"#ffffff10",border:"1px solid #ffffff20",color:"#fff",borderRadius:8,padding:"7px 12px",fontSize:11}}>↻</button>
              </div>
            </div>
          </div>

          {/* ── TEAMS ── */}
          {page === "teams" && (
            <>
              <div style={{
                width:"100%",maxWidth:700,
                background:`linear-gradient(135deg,${team.bg} 0%,#0e0e12 100%)`,
                border:`1px solid ${team.color}30`,
                borderRadius:16,padding:"20px 20px 14px",
                opacity:visible?1:0,
                transform:visible?"translateY(0)":`translateY(${animDir>0?8:-8}px)`,
                transition:"opacity .2s,transform .2s",marginBottom:12,
              }}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14,flexWrap:"wrap",gap:8}}>
                  <div>
                    <div style={{color:team.color,fontSize:28,fontWeight:800,letterSpacing:-1,lineHeight:1}}>{team.name}</div>
                    <div style={{color:"#ffffff40",fontSize:11,marginTop:4,textTransform:"uppercase",letterSpacing:1}}>{current+1}/{TEAM_META.length} · {matches.length} matches</div>
                  </div>
                  <div style={{display:"flex",gap:12}}>
                    {[
                      {l:"Last 6 xG",  v:lastXg ??"—", c:team.color},
                      {l:"Last 6 xGC", v:lastXgc??"—", c:"#f97316"},
                      {l:"Avg xG",     v:sXg,           c:"#ffffff70"},
                      {l:"Avg xGC",    v:sXgc,          c:"#ffffff70"},
                    ].map(s=>(
                      <div key={s.l} style={{textAlign:"center"}}>
                        <div style={{color:s.c,fontSize:20,fontWeight:700,lineHeight:1}}>{s.v}</div>
                        <div style={{color:"#ffffff35",fontSize:9,marginTop:2,whiteSpace:"nowrap"}}>{s.l}</div>
                      </div>
                    ))}
                  </div>
                </div>
                <div style={{background:"#ffffff06",borderRadius:10,padding:"10px 6px 2px"}}>
                  <MainChart team={team} matches={matches}/>
                </div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:8}}>
                  <div style={{display:"flex",gap:14}}>
                    {[{c:team.color,l:"xG",d:""},{c:"#f97316",l:"xGC",d:"7,4"}].map(({c,l,d})=>(
                      <div key={l} style={{display:"flex",alignItems:"center",gap:5}}>
                        <svg width={22} height={6}><line x1={0} y1={3} x2={22} y2={3} stroke={c} strokeWidth={2} strokeDasharray={d} strokeLinecap="round"/></svg>
                        <span style={{color:"#ffffff50",fontSize:10}}>{l}</span>
                      </div>
                    ))}
                  </div>
                  <div style={{color:"#ffffff20",fontSize:10}}>Rolling 6-match · Understat</div>
                </div>
              </div>

              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12,flexWrap:"wrap",justifyContent:"center"}}>
                <button onClick={()=>go(-1)} style={{background:"#ffffff10",border:"1px solid #ffffff20",color:"#fff",borderRadius:8,padding:"7px 16px",fontSize:13}}>← Prev</button>
                <div style={{display:"flex",gap:4,flexWrap:"wrap",maxWidth:400,justifyContent:"center"}}>
                  {TEAM_META.map((t,i)=>(
                    <button key={t.name} onClick={()=>jump(i)} title={t.name} style={{
                      width:30,height:30,borderRadius:6,fontSize:7,fontWeight:700,padding:0,
                      background:i===current?t.color:"#ffffff12",
                      color:i===current?"#000":"#ffffff60",
                      border:i===current?`2px solid ${t.color}`:"1px solid #ffffff15",
                    }}>{t.name.slice(0,3).toUpperCase()}</button>
                  ))}
                </div>
                <button onClick={()=>go(1)} style={{background:"#ffffff10",border:"1px solid #ffffff20",color:"#fff",borderRadius:8,padding:"7px 16px",fontSize:13}}>Next →</button>
              </div>

              <div style={{width:"100%",maxWidth:700}}>
                <div style={{color:"#ffffff25",fontSize:10,marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>All Teams</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:5}}>
                  {TEAM_META.map((t,i)=>(
                    <div key={t.name} onClick={()=>jump(i)} style={{
                      background:i===current?t.bg:"#ffffff06",
                      border:`1px solid ${i===current?t.color+"60":"#ffffff10"}`,
                      borderRadius:8,cursor:"pointer",overflow:"hidden",
                    }}>
                      <MiniChart team={t} matches={(teamData&&teamData[t.key])||[]} w={148} h={68}/>
                    </div>
                  ))}
                </div>
              </div>
            </>
          )}

          {/* ── PLAYERS ── */}
          {page === "players" && (
            <div style={{width:"100%",maxWidth:700}}>
              <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
                {[{val:"lastGW",label:"Last GW"},{val:"last6",label:"Last 6 GWs"},{val:"season",label:"Full Season"}].map(o=>(
                  <button key={o.val} onClick={()=>setPPeriod(o.val)} style={{
                    background:pPeriod===o.val?"#38bdf8":"#ffffff10",
                    color:pPeriod===o.val?"#000":"#ffffff80",
                    border:pPeriod===o.val?"none":"1px solid #ffffff20",
                    borderRadius:8,padding:"6px 14px",fontSize:12,fontWeight:600,
                  }}>{o.label}</button>
                ))}
              </div>
              <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
                {PLAYER_COLS.map(c=>(
                  <button key={c.key} onClick={()=>setPStat(c.key)} title={c.desc} style={{
                    background:pStat===c.key?"#a78bfa":"#ffffff10",
                    color:pStat===c.key?"#000":"#ffffff80",
                    border:pStat===c.key?"none":"1px solid #ffffff20",
                    borderRadius:8,padding:"6px 14px",fontSize:12,fontWeight:600,
                  }}>{c.label}</button>
                ))}
              </div>
              <div style={{background:"#ffffff06",borderRadius:14,padding:"20px 22px",marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                  <div style={{color:"#fff",fontSize:14,fontWeight:700}}>
                    Top 10 — {PLAYER_COLS.find(c=>c.key===pStat)?.desc}
                  </div>
                  <div style={{color:"#ffffff40",fontSize:11}}>
                    {pPeriod==="lastGW"?"Last Gameweek":pPeriod==="last6"?"Last 6 Gameweeks":"Full Season"}
                  </div>
                </div>
                <PlayerTable players={players} statKey={pStat} period={pPeriod}/>
              </div>
              <div style={{color:"#ffffff20",fontSize:10,textAlign:"right"}}>
                Source: Understat · "Big Chances" not available on Understat — Shots & Key Passes used as proxy
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
